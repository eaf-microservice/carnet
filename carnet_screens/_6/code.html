<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#d4e4f5",
              "on-primary-fixed": "#001b3c",
              "inverse-surface": "#2e3132",
              "tertiary": "#0f202c",
              "surface-container-highest": "#e1e3e4",
              "on-secondary": "#ffffff",
              "surface-bright": "#f8fafb",
              "outline": "#737780",
              "tertiary-container": "#253542",
              "on-primary": "#ffffff",
              "surface-variant": "#e1e3e4",
              "secondary-container": "#8bf8c2",
              "secondary-fixed": "#8bf8c2",
              "inverse-primary": "#a7c8ff",
              "primary-fixed-dim": "#a7c8ff",
              "on-tertiary-fixed": "#0d1d29",
              "on-background": "#191c1d",
              "error-container": "#ffdad6",
              "secondary": "#006c48",
              "on-surface-variant": "#43474f",
              "on-tertiary": "#ffffff",
              "on-surface": "#191c1d",
              "surface-container-low": "#f2f4f5",
              "tertiary-fixed-dim": "#b8c8d9",
              "surface-tint": "#3a5f94",
              "primary-container": "#003366",
              "primary-fixed": "#d5e3ff",
              "on-error": "#ffffff",
              "background": "#f8fafb",
              "on-primary-container": "#799dd6",
              "inverse-on-surface": "#eff1f2",
              "surface": "#f8fafb",
              "on-secondary-fixed-variant": "#005235",
              "on-secondary-container": "#00734d",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-fixed-variant": "#394956",
              "on-primary-fixed-variant": "#1f477b",
              "surface-container-high": "#e6e8e9",
              "surface-container": "#eceeef",
              "outline-variant": "#c3c6d1",
              "primary": "#001e40",
              "on-tertiary-container": "#8d9ead",
              "on-secondary-fixed": "#002113",
              "secondary-fixed-dim": "#6edba7",
              "on-error-container": "#93000a",
              "surface-dim": "#d8dadb",
              "error": "#ba1a1a"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-6 selection:bg-secondary-container">
<main class="w-full max-w-md flex flex-col items-center">
<div class="mb-10 text-center">
<div class="w-20 h-20 bg-gradient-to-br from-primary to-primary-container rounded-xl flex items-center justify-center shadow-xl shadow-primary/10 mx-auto mb-6">
<span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1;">storefront</span>
</div>
<h1 class="text-3xl font-extrabold text-primary tracking-tight mb-2">مول الحانوت</h1>
<p class="text-on-surface-variant font-body">مرحباً بك مجدداً في متجرك الرقمي</p>
</div>
<section class="w-full bg-surface-container-lowest rounded-xl p-8 shadow-[0_4px_24px_rgba(25,28,29,0.04)]">
<form class="space-y-6">
<div class="space-y-1.5">
<label class="block text-sm font-semibold text-primary/80 mr-1" for="email">البريد الإلكتروني</label>
<div class="relative flex items-center">
<span class="absolute right-4 text-on-surface-variant material-symbols-outlined">mail</span>
<input class="w-full pr-12 pl-4 py-3.5 bg-surface-container-highest border-b-2 border-outline-variant focus:border-secondary focus:ring-0 transition-colors rounded-t-lg font-body placeholder:text-on-surface-variant/50" id="email" name="email" placeholder="example@email.com" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block text-sm font-semibold text-primary/80 mr-1" for="password">كلمة المرور</label>
<div class="relative flex items-center">
<span class="absolute right-4 text-on-surface-variant material-symbols-outlined">lock</span>
<input class="w-full pr-12 pl-4 py-3.5 bg-surface-container-highest border-b-2 border-outline-variant focus:border-secondary focus:ring-0 transition-colors rounded-t-lg font-body placeholder:text-on-surface-variant/50" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute left-4 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-1">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 rounded border-outline-variant bg-surface-container text-secondary focus:ring-secondary/20 transition-all" type="checkbox"/>
</div>
<span class="text-sm font-medium text-on-surface-variant group-hover:text-primary transition-colors">تذكرني</span>
</label>
<a class="text-sm font-semibold text-primary hover:text-secondary transition-colors underline-offset-4 decoration-secondary/30" href="#">نسيت كلمة المرور؟</a>
</div>
<div class="space-y-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>تسجيل الدخول</span>
<span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform">arrow_back</span>
</button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 text-xs font-medium text-on-surface-variant uppercase">أو</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<button class="w-full bg-white border border-outline-variant text-on-surface font-semibold py-4 rounded-lg hover:bg-surface-container-low active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>الدخول عبر جوجل</span>
</button>
</div>
</form>
</section>
<footer class="mt-8 text-center">
<p class="text-on-surface-variant font-medium">ليس لديك حساب؟ <a class="text-secondary font-bold hover:underline decoration-2 underline-offset-4 mr-1" href="#">إنشاء حساب جديد</a></p>
</footer>
</main>
<div class="fixed bottom-0 left-0 w-full h-1/2 -z-10 pointer-events-none opacity-40">
<div class="absolute bottom-0 left-1/4 w-[500px] h-[500px] bg-secondary-container/20 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-20 -right-20 w-[400px] h-[400px] bg-primary/5 blur-[100px] rounded-full"></div>
</div>
</body></html>
