<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#f8fafb",
              "surface-dim": "#d8dadb",
              "on-background": "#191c1d",
              "on-secondary-fixed": "#002113",
              "tertiary-container": "#253542",
              "on-surface": "#191c1d",
              "inverse-primary": "#a7c8ff",
              "on-error": "#ffffff",
              "on-error-container": "#93000a",
              "secondary": "#006c48",
              "error": "#ba1a1a",
              "surface-container-highest": "#e1e3e4",
              "on-surface-variant": "#43474f",
              "on-primary-fixed-variant": "#1f477b",
              "secondary-fixed-dim": "#6edba7",
              "primary-fixed": "#d5e3ff",
              "inverse-surface": "#2e3132",
              "tertiary": "#0f202c",
              "primary-container": "#003366",
              "outline": "#737780",
              "on-tertiary-fixed": "#0d1d29",
              "secondary-fixed": "#8bf8c2",
              "on-tertiary": "#ffffff",
              "on-primary": "#ffffff",
              "on-primary-container": "#799dd6",
              "surface-container": "#eceeef",
              "outline-variant": "#c3c6d1",
              "inverse-on-surface": "#eff1f2",
              "tertiary-fixed": "#d4e4f5",
              "on-secondary-fixed-variant": "#005235",
              "surface-tint": "#3a5f94",
              "error-container": "#ffdad6",
              "secondary-container": "#8bf8c2",
              "on-secondary-container": "#00734d",
              "tertiary-fixed-dim": "#b8c8d9",
              "surface-variant": "#e1e3e4",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed": "#001b3c",
              "on-tertiary-fixed-variant": "#394956",
              "surface-container-high": "#e6e8e9",
              "surface": "#f8fafb",
              "on-secondary": "#ffffff",
              "surface-container-low": "#f2f4f5",
              "on-tertiary-container": "#8d9ead",
              "primary": "#001e40",
              "primary-fixed-dim": "#a7c8ff",
              "background": "#f8fafb"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .qr-scanner-frame {
            background: linear-gradient(to bottom, transparent 90%, rgba(0, 108, 72, 0.2) 100%);
            background-size: 100% 40px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Component -->
<header class="w-full top-0 sticky z-50 bg-[#f8fafb] dark:bg-slate-900 flex flex-row-reverse justify-between items-center px-6 py-4">
<div class="flex items-center gap-3">
<h1 class="font-manrope font-extrabold text-[#001e40] dark:text-white text-xl">مسح كود الحانوت</h1>
</div>
<button class="hover:bg-[#f2f4f5] dark:hover:bg-slate-800 transition-colors p-2 rounded-full active:opacity-80">
<span class="material-symbols-outlined text-[#001e40] dark:text-blue-400">arrow_forward</span>
</button>
</header>
<!-- Main Content: Scanner Viewport -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pb-32">
<!-- Instructional Text -->
<div class="text-center mb-8 max-w-xs">
<p class="font-body text-on-surface-variant text-base leading-relaxed">
                وجه الكاميرا نحو كود QR الموجود عند البقال للارتباط بمحله
            </p>
</div>
<!-- Viewfinder Section -->
<div class="relative w-full aspect-square max-w-[320px] rounded-3xl overflow-hidden bg-black shadow-2xl">
<!-- Simulated Camera Feed -->
<div class="absolute inset-0 opacity-60">
<img alt="Interior of a traditional Moroccan grocery shop" class="w-full h-full object-cover" data-alt="Interior of a traditional Moroccan neighborhood grocery store with shelves of products and soft ambient natural light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSnBteh4a9Ya0JO7-1cv_KTYjNpcUu4qqlKRiD_pDUZSUOxdA7DAzhHYGfUWIeH6hubibuQGr2V3bVuzzrGsiweZsw_pHvLQS5G8L5u8In9_TbZ8h5DIWcahonz0mIUVdQJ-DWn_2E_owmFJCrZq_WqDndQf45r1Sgo39H7-Z7VBUNVshXD_roygsHUkZkGq_Gq5QYCILnjxSWJCyqXcprn7W7qncJXmi2CqiVezroy8b_oHwaXsqDihfKkojIKkvBs3aZWzOnnjyu"/>
</div>
<!-- Scanning Overlay -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-64 h-64 relative">
<!-- Corner Brackets -->
<div class="absolute top-0 left-0 w-12 h-12 border-t-4 border-l-4 border-secondary rounded-tl-2xl"></div>
<div class="absolute top-0 right-0 w-12 h-12 border-t-4 border-r-4 border-secondary rounded-tr-2xl"></div>
<div class="absolute bottom-0 left-0 w-12 h-12 border-b-4 border-l-4 border-secondary rounded-bl-2xl"></div>
<div class="absolute bottom-0 right-0 w-12 h-12 border-b-4 border-r-4 border-secondary rounded-br-2xl"></div>
<!-- Animated Scan Line (Simplified representation) -->
<div class="absolute left-0 right-0 h-1 bg-secondary shadow-[0_0_15px_rgba(0,108,72,0.8)] opacity-70 top-1/2"></div>
</div>
</div>
<!-- Flash Toggle Button -->
<button class="absolute bottom-6 left-1/2 -translate-x-1/2 bg-white/20 backdrop-blur-lg p-4 rounded-full border border-white/30 text-white hover:bg-white/30 transition-all active:scale-95">
<span class="material-symbols-outlined text-3xl">flashlight_on</span>
</button>
</div>
<!-- Manual Entry Option -->
<div class="mt-12 w-full max-w-[320px]">
<button class="w-full flex items-center justify-center gap-3 py-4 bg-surface-container-low text-primary font-bold rounded-xl hover:bg-surface-container-high transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined">keyboard</span>
<span>إدخال الكود يدوياً</span>
</button>
</div>
<!-- Recent Connections (Editorial Card Pattern) -->
<section class="mt-12 w-full max-w-[320px]">
<h3 class="font-headline font-bold text-sm text-on-surface-variant uppercase tracking-wider mb-4 px-2">آخر الارتباطات</h3>
<div class="space-y-3">
<div class="bg-surface-container-lowest p-4 rounded-xl flex flex-row-reverse items-center gap-4 transition-all hover:shadow-sm">
<div class="w-12 h-12 rounded-lg bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined">storefront</span>
</div>
<div class="flex-grow text-right">
<p class="font-headline font-bold text-primary">حانوت السعادة</p>
<p class="font-label text-xs text-on-surface-variant">تم المسح منذ يومين</p>
</div>
<span class="material-symbols-outlined text-secondary">verified</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar Component -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex flex-row-reverse justify-around items-center px-4 pb-6 pt-3 bg-[#f8fafb]/80 dark:bg-slate-900/80 backdrop-blur-md shadow-[0_-4px_24px_rgba(25,28,29,0.04)]">
<div class="flex flex-col items-center justify-center text-[#43474f] dark:text-slate-500 hover:text-[#001e40] dark:hover:text-white transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-inter text-[10px] font-medium tracking-wide mt-1">الرئيسية</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#8bf8c2]/20 text-[#006c48] dark:text-[#8bf8c2] rounded-xl px-3 py-1 scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="qr_code_scanner" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-inter text-[10px] font-medium tracking-wide mt-1">المسح</span>
</div>
<div class="flex flex-col items-center justify-center text-[#43474f] dark:text-slate-500 hover:text-[#001e40] dark:hover:text-white transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-inter text-[10px] font-medium tracking-wide mt-1">الدفتر</span>
</div>
<div class="flex flex-col items-center justify-center text-[#43474f] dark:text-slate-500 hover:text-[#001e40] dark:hover:text-white transition-transform duration-200 active:scale-90">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-inter text-[10px] font-medium tracking-wide mt-1">الحساب</span>
</div>
</nav>
</body></html>
