<!DOCTYPE html>

<html class="light" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#d4e4f5",
                        "background": "#f8fafb",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eff1f2",
                        "surface-variant": "#e1e3e4",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#8bf8c2",
                        "on-surface-variant": "#43474f",
                        "on-tertiary-fixed": "#0d1d29",
                        "on-background": "#191c1d",
                        "surface-container": "#eceeef",
                        "tertiary": "#0f202c",
                        "on-tertiary-container": "#8d9ead",
                        "tertiary-container": "#253542",
                        "outline": "#737780",
                        "surface-container-high": "#e6e8e9",
                        "primary-fixed": "#d5e3ff",
                        "on-surface": "#191c1d",
                        "primary": "#001e40",
                        "surface-tint": "#3a5f94",
                        "on-tertiary-fixed-variant": "#394956",
                        "inverse-primary": "#a7c8ff",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#e1e3e4",
                        "outline-variant": "#c3c6d1",
                        "secondary-fixed-dim": "#6edba7",
                        "surface-dim": "#d8dadb",
                        "on-tertiary": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "error-container": "#ffdad6",
                        "surface": "#f8fafb",
                        "error": "#ba1a1a",
                        "surface-bright": "#f8fafb",
                        "tertiary-fixed-dim": "#b8c8d9",
                        "primary-container": "#003366",
                        "on-primary-fixed-variant": "#1f477b",
                        "on-secondary-container": "#00734d",
                        "surface-container-low": "#f2f4f5",
                        "on-secondary-fixed": "#002113",
                        "on-secondary-fixed-variant": "#005235",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#a7c8ff",
                        "secondary": "#006c48",
                        "on-primary-container": "#799dd6",
                        "on-primary-fixed": "#001b3c",
                        "secondary-fixed": "#8bf8c2"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .scanner-frame-corner {
            width: 40px;
            height: 40px;
            border-color: #8bf8c2;
            position: absolute;
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #8bf8c2, transparent);
            box-shadow: 0 0 15px #006c48;
            top: 50%;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#f8fafb] dark:bg-slate-900 flex justify-between items-center px-6 py-4 w-full fixed top-0 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#001e40] dark:text-blue-400">qr_code_scanner</span>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-[#001e40] dark:text-blue-400">Mol Lhanout</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-primary">person</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 pt-20 pb-24 px-6 flex flex-col">
<!-- Header Section -->
<section class="mt-4 mb-8">
<h2 class="font-headline font-extrabold text-2xl text-primary mb-2">مسح كود الحانوت</h2>
<p class="text-on-surface-variant text-sm leading-relaxed max-w-[85%]">
                وجه الكاميرا نحو كود QR الموجود عند البقال للارتباط بمحله
            </p>
</section>
<!-- Scanner Viewport (Bento-style depth) -->
<section class="relative flex-1 min-h-[350px] bg-surface-container-low rounded-xl overflow-hidden shadow-inner flex items-center justify-center mb-6 border-outline-variant/10 border">
<!-- Simulated Camera Background -->
<div class="absolute inset-0 bg-slate-900 overflow-hidden">
<img alt="Grocery store interior" class="w-full h-full object-cover opacity-40 blur-sm" data-alt="blurred interior of a traditional Moroccan neighborhood grocery store with shelves of goods and warm ambient lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAz8_exz_gjbRndoL7CqLDuKqT3mBZNrGhkZ5w5cCMnXLyCyuPx_Cnc4wcMJR-Eo5sH_JNhhOkfMnItg0Wu_yUpaaGtEoNY3m5zzSHa6FKMld3fplrOW-KlPi3qz-2biKCOXmIDwCdLeQ9btv28qoVm08kslSE5-oN1SVkQOmizk57fthSpWl2P7kRJ-BGyaMslRquFofFyOtvAMFEWy8bpGGu32-kqLaTKgrKS4Dow82T0sGZ9I1MO0gUdVZdezp818e86bQYNHybV"/>
</div>
<!-- Scanner UI Overlay -->
<div class="relative w-64 h-64 z-10">
<!-- Corners -->
<div class="scanner-frame-corner top-0 right-0 border-t-4 border-r-4 rounded-tr-xl"></div>
<div class="scanner-frame-corner top-0 left-0 border-t-4 border-l-4 rounded-tl-xl"></div>
<div class="scanner-frame-corner bottom-0 right-0 border-b-4 border-r-4 rounded-br-xl"></div>
<div class="scanner-frame-corner bottom-0 left-0 border-b-4 border-l-4 rounded-bl-xl"></div>
<!-- Scanning Line -->
<div class="scan-line absolute w-full z-20"></div>
<!-- Central Visualizer -->
<div class="absolute inset-4 border border-secondary/20 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-secondary-fixed-dim text-5xl opacity-30">qr_code_2</span>
</div>
</div>
<!-- Flash Toggle Button -->
<button class="absolute bottom-6 right-6 w-12 h-12 bg-surface-container-lowest/20 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/20 hover:bg-surface-container-lowest/40 transition-colors">
<span class="material-symbols-outlined">flashlight_on</span>
</button>
</section>
<!-- Action Section -->
<div class="space-y-4">
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold rounded-lg shadow-lg flex items-center justify-center gap-3 active:scale-95 transition-transform">
<span class="material-symbols-outlined">edit_square</span>
                إدخال الكود يدوياً
            </button>
<!-- Recent Connections (Editorial Style) -->
<div class="bg-surface-container-lowest p-5 rounded-xl border border-outline-variant/15">
<div class="flex items-center justify-between mb-3">
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest font-label">آخر الارتباطات</span>
<span class="material-symbols-outlined text-secondary text-sm">history</span>
</div>
<div class="flex items-center gap-4 group cursor-pointer">
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center text-primary group-hover:bg-secondary-container transition-colors">
<span class="material-symbols-outlined">storefront</span>
</div>
<div class="flex-1">
<h4 class="font-headline font-bold text-primary text-sm">حانوت السعادة</h4>
<p class="text-on-surface-variant text-[11px]">ارتبطت به منذ 2 يوم</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transform transition-transform group-hover:-translate-x-1">chevron_left</span>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-[#ffffff]/80 dark:bg-slate-900/80 backdrop-blur-md border-t border-[#c3c6d1]/15 shadow-[0_-4px_24px_rgba(25,28,29,0.04)] rounded-t-lg flex justify-around items-center px-4 py-3">
<!-- Home -->
<div class="flex flex-col items-center justify-center text-[#43474f] dark:text-slate-400 p-2 scale-95 active:scale-90 transition-transform cursor-pointer">
<span class="material-symbols-outlined">home</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-[0.05rem] mt-1">الرئيسية</span>
</div>
<!-- Scan (ACTIVE) -->
<div class="flex flex-col items-center justify-center bg-[#003366] text-white rounded-2xl p-2 scale-95 active:scale-90 transition-transform cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-[0.05rem] mt-1">المسح</span>
</div>
<!-- Orders -->
<div class="flex flex-col items-center justify-center text-[#43474f] dark:text-slate-400 p-2 scale-95 active:scale-90 transition-transform cursor-pointer">
<span class="material-symbols-outlined">shopping_bag</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-[0.05rem] mt-1">الطلبات</span>
</div>
<!-- Account -->
<div class="flex flex-col items-center justify-center text-[#43474f] dark:text-slate-400 p-2 scale-95 active:scale-90 transition-transform cursor-pointer">
<span class="material-symbols-outlined">person</span>
<span class="font-['Inter'] font-medium text-[10px] uppercase tracking-[0.05rem] mt-1">حسابي</span>
</div>
</nav>
</body></html>
